name: Integration Test (Last Run Action)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Get last run
        id: get
        uses: benbalter/last-run-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mode: get
          fail-if-missing: 'false'

      - name: Echo last run
        run: |
          ts="${{ steps.get.outputs.last-run }}"
          if [ -z "$ts" ]; then
            echo "No previous run found (first run)"
          else
            echo "Previous run timestamp: $ts"
          fi

      - name: Set last run
        uses: benbalter/last-run-action@main
        with:
          mode: set
